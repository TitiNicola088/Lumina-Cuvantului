<!DOCTYPE html>
<html lang="ro">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lumina Cuvântului</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Inter,sans-serif;
background:#f7f3ea;
color:#222;
overflow-x:hidden;
}

.container{
width:92%;
max-width:1400px;
margin:auto;
}

img{
max-width:100%;
display:block;
}

a{
text-decoration:none;
}
.header{
background:#071223;
position:sticky;
top:0;
z-index:1000;
}

.nav{
height:92px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
display:flex;
align-items:center;
gap:15px;
color:white;
}

.logo img{
height:58px;
}

.logo-text h2{
font-size:30px;
font-weight:800;
line-height:1;
color:white;
}

.logo-text span{
font-size:24px;
font-weight:700;
color:#d6b15a;
}

nav{
display:flex;
gap:28px;
}

nav a{
color:white;
font-weight:600;
transition:.3s;
}

nav a:hover,
nav a.active{
color:#d6b15a;
}

.icons{
display:flex;
gap:20px;
font-size:22px;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<header class="header">

<div class="container nav">

<a href="#" class="logo">

<img src="406C3567-613F-41F3-AF65-160D6E0A4B0D.jpeg" alt="Lumina Cuvântului">

<div class="logo-text">
<h2>Lumina</h2>
<span>Cuvântului</span>
</div>

</a>

<nav>

<a class="active" href="#">Acasă</a>
<a href="#">Biblia</a>
<a href="#">Studii</a>
<a href="#">Bibliotecă</a>
<a href="#">Rugăciuni</a>
<a href="#">Plan de citire</a>
<a href="#">Despre noi</a>
<a href="#">Contact</a>

</nav>

<div class="icons">
🌙
🔍
</div>

</div>

</header>

</body>

</body>
</html>
