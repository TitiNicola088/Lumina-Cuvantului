<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Cuvântului</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Inter,sans-serif;
background:#f7f4ec;
color:#222;
}
.container{
width:90%;
max-width:1400px;
margin:auto;
}

.header{
background:#071223;
position:sticky;
top:0;
z-index:1000;
}

.header .container{
height:90px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
display:flex;
align-items:center;
gap:15px;
text-decoration:none;
color:white;
font-size:28px;
font-weight:700;
}

.logo img{
height:55px;
}

.menu{
display:flex;
gap:28px;
}

.menu a{
color:white;
text-decoration:none;
font-weight:500;
transition:.3s;
}

.menu a:hover{
color:#d6b15a;
}

.icons{
display:flex;
gap:20px;
font-size:22px;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<header class="header">

<div class="container">

<a href="#" class="logo">
<img src="406C3567-613F-41F3-AF65-160D6E0A4B0D.jpeg" alt="Lumina Cuvântului">
<span>Lumina Cuvântului</span>
</a>

<nav class="menu">
<a href="#">Acasă</a>
<a href="#">Biblia</a>
<a href="#">Studii</a>
<a href="#">Bibliotecă</a>
<a href="#">Rugăciuni</a>
<a href="#">Plan de citire</a>
<a href="#">Despre noi</a>
<a href="#">Contact</a>
</nav>

<div class="icons">
🌙
🔍
</div>

</div>

</header>

</body>

</body>
</html>
